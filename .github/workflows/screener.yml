name: AI Stock Screener

on:
  schedule:
    - cron: "30 3 * * 1-5"   # 9:00 AM IST
    - cron: "50 9 * * 1-5"   # 3:20 PM IST
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Screener
        run: python research_main.py --from-screener --mode btst
